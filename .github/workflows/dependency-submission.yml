name: Dependency Submission
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "26"
          distribution: "temurin"
      - uses: gradle/actions/dependency-submission@v4
