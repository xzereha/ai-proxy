spring:
    application:
        name: ai
    cache:
        type: caffeine
        expire-after-write-minutes: 10
        maximum-size: 100
    config:
        import: vault://

    # Vault configuration
    cloud:
        vault:
            host: localhost
            port: 8200
            scheme: http
            authentication: token
            token: ${VAULT_TOKEN}
            kv:
                enabled: true

openai:
    connect-timeout-ms: 2000
    response-timeout-seconds: 8
    retry:
        max-attempts: 3
        initial-delay-ms: 1000
        max-delay-ms: 8000

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui
        enabled: true
